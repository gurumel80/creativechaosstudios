<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Chaos Studios</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f2f2f2;
      color: #222;
      text-align: center;
    }

    header {
      background: #ff6f61;
      color: white;
      padding: 100px 20px 60px;
    }

    header h1 {
      font-size: 3rem;
      margin: 0 0 20px;
    }

    header p {
      font-size: 1.2rem;
      max-width: 600px;
      margin: 0 auto;
    }

    section {
      padding: 50px 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .game-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .game-list li {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .game-list li:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }

    .game-list a {
      text-decoration: none;
      color: #ff6f61;
      font-weight: bold;
      display: block;
      font-size: 1.1rem;
    }

    footer {
      padding: 30px 20px;
      background: #222;
      color: white;
      font-size: 0.9rem;
    }

    @media (max-width: 500px){
      header h1 {
        font-size: 2.2rem;
      }

      header p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Creative Chaos Studios</h1>
    <p>Making fun, playful games for everyone! Explore our interactive apps, creative projects, and educational games for kids.</p>
  </header>

  <section>
    <h2>Our Games</h2>
    <ul class="game-list">
      <li><a href="https://your-vercel-link1.vercel.app" target="_blank">Star Soup</a></li>
      <li><a href="https://your-vercel-link2.vercel.app" target="_blank">Number Bots</a></li>
      <li><a href="https://your-vercel-link3.vercel.app" target="_blank">10 Pin Bowling</a></li>
      <!-- Add more games here as you make them -->
    </ul>
  </section>

  <footer>
    &copy; 2026 Creative Chaos Studios | Made with love and chaos
  </footer>

</body>
</html>
